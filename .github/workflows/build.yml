# ──────────────────────────────────────────────────────────────────────────────
# PortPane by ShackDesk
# Project : https://github.com/Computer-Tsu/shackdesk-portpane
# Author  : Mark McDow (N4TEK) — My Computer Guru LLC
# License : GPL v3 / Commercial (see LICENSE-GPL.md, LICENSE-COMMERCIAL.md)
#
# Workflow : Build · Test · Publish · Release
# Purpose  : Main CI/CD pipeline. Builds and tests on every push and PR to main.
#            Publishes a self-contained Windows executable on pushes to main or
#            version tags (v*). Creates a GitHub Release with changelog notes and
#            artifacts when a version tag is pushed.
#
# Triggers :
#   - push to dev                    — build, test, publish; updates rolling latest-alpha release
#   - push to main                   — build, run tests, publish exe artifact
#   - push of v* tag                 — publish + build installer + create GitHub Release
#   - pull_request to main           — build and run tests only (no publish)
#   - workflow_dispatch (manual)     — always builds; two optional inputs:
#       skip_tests:       skip xUnit tests (useful when you just need a compile check)
#       publish_artifact: upload PortPane.exe artifact even without a tag/push to main
#
# Release channels (controlled by src/PortPane/ChannelInfo.cs on each branch):
#   dev    — Alpha: rapid builds, 14-day expiry, all features unlocked, verbose logging
#   beta   — Beta:  60-day expiry, opt-in telemetry, normal logging
#   main   — Stable: no expiry, release tags only
#
# Required secrets/variables : None for build/test. GitHub token is provided
#   automatically by Actions for the release job (contents: write permission).
#   Future: SIGNING_PASSWORD when code signing is enabled.
#
# Outputs / artifacts :
#   - test-results-{sha}              : xUnit .trx test results (always)
#   - PortPane-{version}-{sha}        : PortPane.exe + SHA-256 hash (main/dev/tags)
#   - PortPane-Installer-{tag}        : Inno Setup installer .exe (tags only)
#   - GitHub Release (latest-alpha)   : Rolling alpha exe updated on every dev push
#   - GitHub Release (versioned)      : All artifacts + CHANGELOG notes (tags only)
#
# Manual trigger : Go to Actions tab → "Build · Test · Publish · Release" →
#   "Run workflow" → select branch → click "Run workflow"
# ──────────────────────────────────────────────────────────────────────────────
name: Build · Test · Publish · Release

on:
  push:
    branches: [ main, dev ]
    tags:     [ 'v*' ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - 'CHANGELOG*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - 'CHANGELOG*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip xUnit tests (build only — useful for compile check)'
        required: false
        default: false
        type: boolean
      publish_artifact:
        description: 'Upload PortPane.exe artifact (even without a tag)'
        required: false
        default: false
        type: boolean

env:
  DOTNET_VERSION:   '8.0.x'
  SOLUTION:         'ShackDesk-PortPane.sln'
  APP_PROJECT:      'src/PortPane/PortPane.csproj'
  TEST_PROJECT:     'src/PortPane.Tests/PortPane.Tests.csproj'
  RID:              'win-x64'
  APP_EXE:          'PortPane.exe'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build — Debug
        run: dotnet build ${{ env.SOLUTION }} --configuration Debug --no-restore

      - name: Run xUnit tests
        if: ${{ !inputs.skip_tests }}
        run: >
          dotnet test ${{ env.TEST_PROJECT }}
          --configuration Debug
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !inputs.skip_tests && always() }}
        with:
          name: test-results-${{ github.sha }}
          path: ./TestResults/*.trx

  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish Release Exe
    runs-on: windows-latest
    needs: build-and-test
    if: >
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/dev' ||
       startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.publish_artifact))

    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Extract and compose version from BrandingInfo and ChannelInfo
        id: version
        shell: pwsh
        run: |
          $base    = (Select-String 'src/PortPane/BrandingInfo.cs' `
            -Pattern 'Version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $suffix  = (Select-String 'src/PortPane/ChannelInfo.cs' `
            -Pattern 'VersionSuffix\s*=\s*"([^"]*)"').Matches[0].Groups[1].Value
          $channel = (Select-String 'src/PortPane/ChannelInfo.cs' `
            -Pattern 'Channel\s*=\s*ReleaseChannel\.(\w+)').Matches[0].Groups[1].Value
          $stamp   = [DateTime]::UtcNow.ToString("yyyyMMdd-HHmm")
          $version = switch ($channel) {
            'Alpha'  { "$base-$suffix.$stamp" }
            'Beta'   { "$base-$suffix" }
            default  { $base }
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "channel=$channel" >> $env:GITHUB_OUTPUT
          echo "Version: $version (channel: $channel)"

      - name: Stamp BuildDate into BrandingInfo
        shell: pwsh
        run: |
          $now  = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
          $file = 'src/PortPane/BrandingInfo.cs'
          (Get-Content $file) -replace '(BuildDate\s*=\s*)"[^"]*"', "`$1`"$now`"" |
            Set-Content $file
          echo "Stamped BuildDate = $now"

      - name: Publish — single self-contained exe
        run: >
          dotnet publish ${{ env.APP_PROJECT }}
          --configuration Release
          --runtime ${{ env.RID }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:ReadyToRun=true
          --output ./publish

      - name: Apply ConfuserEx obfuscation
        # TODO: Add ConfuserEx step here when crconf.exe is available in CI.
        # Example:
        #   - name: Obfuscate
        #     run: confuserex -n PortPane.crproj
        #     # crproj references ./publish/PortPane.exe as input
        shell: pwsh
        run: |
          # Placeholder — ConfuserEx not yet configured.
          # Obfuscation will be added before v1.0 stable release.
          Write-Host "Obfuscation step placeholder — skipping"

      # Code signing placeholder:
      # When an EV or OV certificate is obtained, add the following step here:
      #   - name: Sign executable
      #     run: >
      #       signtool.exe sign
      #         /fd sha256
      #         /tr http://timestamp.digicert.com
      #         /td sha256
      #         /f certificate.pfx
      #         /p ${{ secrets.SIGNING_PASSWORD }}
      #         ./publish/${{ env.APP_EXE }}

      - name: Compute SHA-256
        id: hash
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 './publish/${{ env.APP_EXE }}').Hash.ToLower()
          $hash | Out-File -FilePath './publish/${{ env.APP_EXE }}.sha256' -NoNewline
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "SHA256: $hash"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: PortPane-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: |
            ./publish/${{ env.APP_EXE }}
            ./publish/${{ env.APP_EXE }}.sha256
            ./publish/Data/

  # ─────────────────────────────────────────────────────────────────────
  installer:
    name: Build Inno Setup Installer
    runs-on: windows-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Publish for installer
        run: |
          dotnet restore ${{ env.SOLUTION }}
          dotnet publish ${{ env.APP_PROJECT }} --configuration Release --runtime ${{ env.RID }} --self-contained true -p:PublishSingleFile=true --output ./publish

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc installer\PortPane.iss
          } else {
            Write-Warning "Inno Setup not found — skipping installer build"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        if: hashFiles('installer/Output/*.exe') != ''
        with:
          name: PortPane-Installer-${{ github.ref_name }}
          path: installer/Output/*.exe

  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: [ publish, installer ]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download exe artifact
        uses: actions/download-artifact@v8
        with:
          pattern: PortPane-*-${{ github.sha }}
          path: ./release
          merge-multiple: true

      - name: Download installer artifact (optional)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: PortPane-Installer-*
          path: ./release
          merge-multiple: true

      - name: Extract CHANGELOG entry for this version
        id: notes
        shell: pwsh
        run: |
          $tag     = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $content = Get-Content CHANGELOG.md -Raw
          # Extract the section between this version header and the next
          $pattern = "(?s)## \[$version\].*?(?=## \[|\z)"
          $match   = [regex]::Match($content, $pattern)
          $notes   = if ($match.Success) { $match.Value.Trim() } else { "See CHANGELOG.md for details." }
          $notes | Out-File -FilePath ./release_notes.md -Encoding utf8
          echo "notes_file=./release_notes.md" >> $env:GITHUB_OUTPUT

      - name: Rename artifacts with version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          Get-ChildItem ./release/${{ env.APP_EXE }} -ErrorAction SilentlyContinue |
            Rename-Item -NewName "PortPane-$tag-win-x64.exe"
          Get-ChildItem ./release/${{ env.APP_EXE }}.sha256 -ErrorAction SilentlyContinue |
            Rename-Item -NewName "PortPane-$tag-win-x64.exe.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/PortPane-*.exe
            ./release/PortPane-*.sha256
          body_path: ./release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false

  # ─────────────────────────────────────────────────────────────────────
  rolling-alpha:
    name: Update Rolling Alpha Release
    runs-on: windows-latest
    needs: publish
    if: github.ref == 'refs/heads/dev'

    permissions:
      contents: write

    steps:
      - name: Download exe artifact
        uses: actions/download-artifact@v8
        with:
          pattern: PortPane-*-${{ github.sha }}
          path: ./release
          merge-multiple: true

      - name: Rename artifact with composed version
        shell: pwsh
        run: |
          $version = '${{ needs.publish.outputs.version }}'
          Get-ChildItem './release/${{ env.APP_EXE }}' -ErrorAction SilentlyContinue |
            Rename-Item -NewName "PortPane-$version-win-x64.exe"
          Get-ChildItem './release/${{ env.APP_EXE }}.sha256' -ErrorAction SilentlyContinue |
            Rename-Item -NewName "PortPane-$version-win-x64.exe.sha256"

      - name: Delete existing latest-alpha assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $repo = '${{ github.repository }}'
          $assets = gh release view latest-alpha --repo $repo --json assets --jq '.assets[].name' 2>$null
          if ($assets) {
            $assets -split "`n" | Where-Object { $_.Trim() -ne '' } | ForEach-Object {
              gh release delete-asset latest-alpha $_.Trim() --repo $repo --yes 2>$null
            }
          }
          exit 0

      - name: Update rolling latest-alpha release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-alpha
          name: "Latest Alpha — ${{ needs.publish.outputs.version }}"
          body: |
            Automated alpha build from the `dev` branch.

            **Version:** `${{ needs.publish.outputs.version }}`
            **Commit:** `${{ github.sha }}`

            This build has a 14-day expiry. Always download the current version from this page.
            Not recommended for general use — for testing purposes only.
          prerelease: true
          files: |
            ./release/PortPane-*.exe
            ./release/PortPane-*.sha256
