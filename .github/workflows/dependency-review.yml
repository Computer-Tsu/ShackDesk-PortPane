#
# Workflow : Dependency Review
# Purpose  : Checks NuGet package changes introduced in a pull request against
#            the GitHub Advisory Database. Fails the PR if any dependency adds
#            or upgrades to a version with a known vulnerability at "moderate"
#            severity or higher. Protects the supply chain before merging.
#
# Triggers :
#   - pull_request to main   — runs automatically on every PR
#   - workflow_dispatch      — manual check (runs against default branch)
#
# Required secrets/variables : None — uses default GITHUB_TOKEN.
#
# Outputs / artifacts : PR check status. Vulnerability details appear in the
#   PR "Checks" tab and as inline annotations on the diff.
#
# Manual trigger : Actions tab → "Dependency Review" → "Run workflow"
# ──────────────────────────────────────────────────────────────────────────────
name: Dependency Review

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:    # Manual trigger always present

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents:      read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
