#
# File    : .github/dependabot.yml
# Purpose : Configures GitHub Dependabot to automatically open pull requests
#           when NuGet packages or GitHub Actions have newer versions available.
#           Keeps the project's dependency versions current and patches known
#           vulnerabilities automatically without manual monitoring.
#
# Schedule : Weekly on Monday mornings (UTC). This means you will typically
#   receive dependency PRs at the start of the work week for review.
#
# Labels applied to automated PRs : "dependencies", "automated"
#   This makes it easy to filter Dependabot PRs in the PR list.
# ──────────────────────────────────────────────────────────────────────────────
version: 2

updates:
  # NuGet packages (NAudio, Serilog, Velopack, xUnit, etc.)
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (actions/checkout, actions/setup-dotnet, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore(actions)"
